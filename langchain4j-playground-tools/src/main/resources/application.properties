quarkus.langchain4j.timeout=3000s
quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true
quarkus.langchain4j.chat-memory.memory-window.max-messages=10
quarkus.langchain4j.chat-model.provider=ai-gemini

# ollama
quarkus.langchain4j.ollama.chat-model.model-id=qwen2.5:3b

# google gemini
quarkus.langchain4j.ai.gemini.api-key=${GOOGLE_API_KEY}
quarkus.langchain4j.ai.gemini.chat-model.model-id=gemini-2.5-flash

# openai
quarkus.langchain4j.openai.chat-model.model-name=gpt-4.1-mini
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}