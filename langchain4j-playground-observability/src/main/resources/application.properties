%dev.quarkus.console.enabled=false
quarkus.langchain4j.timeout=300s
quarkus.langchain4j.chat-model.provider=ai-gemini

quarkus.langchain4j.ai.gemini.api-key=${GOOGLE_API_KEY}
quarkus.langchain4j.ai.gemini.chat-model.model-id=gemini-2.5-flash

# Include prompts and completions in spans (disable in production)
quarkus.langchain4j.tracing.include-prompt=true
quarkus.langchain4j.tracing.include-completion=true

quarkus.otel.service.name=langchain4j-observability
quarkus.otel.logs.enabled=true
quarkus.otel.traces.enabled=true
# a utiliser uniquement en dÕmo
quarkus.otel.bsp.schedule.delay=1s
quarkus.otel.metric.export.interval=5s

%jaeger.quarkus.observability.enabled=false
%jaeger.quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317
%jaeger.quarkus.console.enabled=false
%jaeger.quarkus.otel.metrics.enabled=false
%jaeger.quarkus.otel.logs.enabled=false

%langfuse.quarkus.observability.enabled=false
%langfuse.quarkus.langfuse.otel.span-filter=ALL
%langfuse.quarkus.console.enabled=false
%langfuse.quarkus.otel.metrics.enabled=false
%langfuse.quarkus.otel.logs.enabled=false
